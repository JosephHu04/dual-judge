<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 监控面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui;padding:20px}
h1{text-align:center;color:#38bdf8;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:1000px;margin:0 auto 20px}
.card{background:#1e293b;border-radius:12px;padding:16px;text-align:center}
.card .num{font-size:2rem;font-weight:bold}.card .label{font-size:0.8rem;color:#94a3b8;margin-top:4px}
.feed{background:#1e293b;border-radius:12px;padding:16px;max-width:1000px;margin:0 auto;max-height:500px;overflow-y:auto}
.feed h3{color:#38bdf8;margin-bottom:10px}
.feed-item{padding:8px 0;border-bottom:1px solid #1e293b;font-size:0.85rem;display:flex;gap:12px;align-items:flex-start}
.feed-item .time{color:#64748b;min-width:55px;font-size:0.75rem}
.feed-item .room{color:#38bdf8;min-width:60px;font-weight:bold}
.feed-item .msg{flex:1;color:#e2e8f0}
.feed-item .tool{color:#22c55e;font-size:0.75rem;background:#0f2d1a;padding:2px 6px;border-radius:4px}
.controls{text-align:center;margin:15px}
button{background:#38bdf8;color:#0f172a;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:bold}
button:hover{background:#7dd3fc}
</style>
</head>
<body>
<h1>Agent 实时监控</h1>
<div class="controls">
  <button onclick="clearFeed()">清空日志</button>
  <span id="status" style="margin-left:12px;color:#22c55e">● 监听中</span>
</div>
<div class="grid">
  <div class="card"><div class="num" style="color:#38bdf8" id="count">0</div><div class="label">总请求数</div></div>
  <div class="card"><div class="num" style="color:#22c55e" id="tools">0</div><div class="label">工具调用数</div></div>
  <div class="card"><div class="num" style="color:#f59e0b" id="errors">0</div><div class="label">异常数</div></div>
</div>
<div class="feed"><h3>实时日志</h3><div id="feedList"></div></div>

<script>
let total=0,tools=0,errors=0;
function addItem(room, msg, tool){
  total++; if(tool) tools++; if(msg.includes('异常')) errors++;
  document.getElementById('count').textContent=total;
  document.getElementById('tools').textContent=tools;
  document.getElementById('errors').textContent=errors;
  const el=document.createElement('div');el.className='feed-item';
  const t=new Date().toLocaleTimeString();
  el.innerHTML=`<span class="time">${t}</span><span class="room">${room||'-'}</span><span class="msg">${msg}</span>${tool?`<span class="tool">${tool}</span>`:''}`;
  document.getElementById('feedList').insertBefore(el, document.getElementById('feedList').firstChild);
}
function clearFeed(){
  fetch('/api/monitor/logs/clear',{method:'POST'}).then(()=>{
    document.getElementById('feedList').innerHTML='';
    total=tools=errors=0;
    document.getElementById('count').textContent='0';
    document.getElementById('tools').textContent='0';
    document.getElementById('errors').textContent='0';
  });
}
setInterval(async()=>{
  try{
    const r=await fetch('/api/monitor/logs'); const d=await r.json();
    document.getElementById('status').innerHTML='<span style=color:#22c55e>● 在线 ('+d.total+'条记录)</span>';
    document.getElementById('count').textContent=d.total;
    if(d.logs.length>0){
      const latest=d.logs[0];
      document.getElementById('feedList').innerHTML=d.logs.map(l=>
        `<div class="feed-item"><span class="time">${l.time}</span><span class="room">${l.session}</span><span class="msg">${l.input} → ${l.reply}</span>${l.tools?`<span class="tool">${l.tools}个工具 ${l.elapsed}</span>`:''}</div>`
      ).join('');
    }
  }catch(e){document.getElementById('status').innerHTML='<span style=color:#ef4444>● 离线</span>'}
},2000);
</script>
</body>
</html>
