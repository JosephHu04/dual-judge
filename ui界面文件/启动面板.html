<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客房服务 Agent - 启动面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh}
.panel{text-align:center}
h1{color:#38bdf8;font-size:1.8rem;margin-bottom:8px}
.sub{color:#64748b;margin-bottom:40px}
.btns{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.btn{display:block;width:200px;padding:20px;border-radius:16px;text-decoration:none;color:#fff;font-size:1.1rem;font-weight:bold;transition:0.3s}
.btn:hover{transform:translateY(-4px)}
.btn.chat{background:linear-gradient(135deg,#1e40af,#3b82f6)}
.btn.monitor{background:linear-gradient(135deg,#166534,#22c55e)}
.btn.dashboard{background:linear-gradient(135deg,#854d0e,#f59e0b)}
.btn .icon{font-size:2rem;display:block;margin-bottom:8px}
.btn .desc{font-size:0.75rem;opacity:0.7;margin-top:4px}
.status{margin-top:30px;font-size:0.85rem}
.status span{color:#22c55e}
</style>
</head>
<body>
<div class="panel">
<h1>客房服务 Agent</h1>
<div class="sub">Qwen3-4B · vLLM 部署 · 192.168.252.249:8000</div>

<div class="btns">
<a class="btn chat" href="chat_ui.html">
  <span class="icon">💬</span> 聊天界面
  <span class="desc">客房服务对话测试</span>
</a>
<a class="btn monitor" href="#" onclick="openMonitor()">
  <span class="icon">📊</span> 监控面板
  <span class="desc">查看 API 调用记录</span>
</a>
<a class="btn dashboard" href="../裁判系统/双裁判引擎/dashboard.html" target="_blank">
  <span class="icon">⚖️</span> 裁判仪表盘
  <span class="desc">双裁判测试动画</span>
</a>
</div>

<div class="status" id="status">检查服务器中...</div>
</div>

<script>
function openMonitor(){
  window.open('http://localhost:8000/monitor','_blank');
}
fetch('http://localhost:8000/api/health')
  .then(r=>r.json())
  .then(d=>{document.getElementById('status').innerHTML='<span>● 服务器在线</span> | 模型: '+d.model+' | 工具: '+d.tools.length+'个'})
  .catch(()=>{document.getElementById('status').innerHTML='<span style=color:#ef4444>● 服务器离线</span> — 请先启动 python server.py'});
</script>
</body>
</html>
